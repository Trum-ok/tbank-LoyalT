<tui-root>
  <app-toast-host />

  @if (showChrome()) {
    <div class="layout">
      <aside class="layout__sidebar">
        <a routerLink="/dashboard" class="layout__brand">
          <span class="layout__brand-mark">Т</span>
          <span class="layout__brand-text">
            <span class="layout__brand-name">Т-Лояльность</span>
            <span class="layout__brand-sub">админ-панель</span>
          </span>
        </a>

        <nav class="layout__nav">
          <a
            routerLink="/dashboard"
            routerLinkActive="is-active"
            class="layout__nav-link"
          >
            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
              <rect x="3" y="3" width="8" height="10" rx="2" fill="currentColor" />
              <rect x="13" y="3" width="8" height="6" rx="2" fill="currentColor" />
              <rect x="3" y="15" width="8" height="6" rx="2" fill="currentColor" />
              <rect x="13" y="11" width="8" height="10" rx="2" fill="currentColor" />
            </svg>
            <span>Метрики</span>
          </a>
          <a
            routerLink="/moderation"
            routerLinkActive="is-active"
            class="layout__nav-link"
          >
            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
              <path
                d="M9 16.2 4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4L9 16.2z"
                fill="currentColor"
              />
            </svg>
            <span>Модерация</span>
          </a>
          <a
            routerLink="/partners"
            routerLinkActive="is-active"
            class="layout__nav-link"
          >
            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
              <circle cx="9" cy="8" r="3.4" fill="currentColor" />
              <path d="M3 20a6 6 0 0 1 12 0v1H3v-1z" fill="currentColor" />
              <circle cx="17" cy="9" r="2.6" fill="currentColor" opacity="0.6" />
              <path
                d="M15.5 21v-1a5.5 5.5 0 0 1 6.5-5.4V21h-6.5z"
                fill="currentColor"
                opacity="0.6"
              />
            </svg>
            <span>Партнёры</span>
          </a>
          <a
            routerLink="/catalog"
            routerLinkActive="is-active"
            class="layout__nav-link"
          >
            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
              <rect x="3" y="3" width="8" height="8" rx="2" fill="currentColor" />
              <rect
                x="13"
                y="3"
                width="8"
                height="8"
                rx="2"
                fill="currentColor"
                opacity="0.6"
              />
              <rect
                x="3"
                y="13"
                width="8"
                height="8"
                rx="2"
                fill="currentColor"
                opacity="0.6"
              />
              <rect x="13" y="13" width="8" height="8" rx="2" fill="currentColor" />
            </svg>
            <span>Каталог</span>
          </a>
        </nav>

        <div class="layout__partner">
          <span class="layout__partner-avatar">Т</span>
          <span class="layout__partner-meta">
            <span class="layout__partner-name">Панель Т-Банка</span>
            <span class="layout__partner-id">
              {{ identity.current().email ?? 'модерация и каталог' }}
            </span>
          </span>
        </div>
      </aside>

      <div class="layout__body">
        <header class="layout__topbar">
          <div class="layout__topbar-left">
            <span class="layout__env">DEV</span>
            <app-admin-switcher />
          </div>
          <div class="layout__topbar-right">
            <app-theme-toggle />
          </div>
        </header>

        <main class="layout__main">
          <router-outlet />
        </main>
      </div>
    </div>
  } @else {
    <router-outlet />
  }
</tui-root>
