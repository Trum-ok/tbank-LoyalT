<section class="profile-page">
  @if (loading()) {
    <div class="profile-page__loader">Загрузка профиля…</div>
  } @else {
    <div class="profile-page__card">
      <h2 class="profile-page__title">Мой профиль</h2>

      <form (submit)="save(); $event.preventDefault()" class="profile-page__form">
        <div class="profile-page__field">
          <tui-textfield>
            <label tuiLabel>Дата рождения</label>
            <input
              tuiInputDate
              [formControl]="birthdayControl"
              [max]="maxDate"
            />
          </tui-textfield>
          <span class="profile-page__hint">
            Используется для начисления бонусов в день рождения
          </span>
        </div>

        <div class="profile-page__actions">
          <button
            tuiButton
            type="submit"
            appearance="primary"
            size="m"
            [disabled]="saving()"
          >
            {{ saving() ? 'Сохраняем…' : 'Сохранить' }}
          </button>
        </div>
      </form>
    </div>
  }
</section>
